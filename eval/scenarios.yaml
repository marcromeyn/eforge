# Eforge evaluation scenarios
# Each scenario defines a fixture + PRD to run eforge against.
# Fixtures live in eval/fixtures/<fixture>/ as plain project files (no .git).

scenarios:
  - id: todo-api-health-check
    fixture: todo-api
    prd: docs/add-health-check.md
    validate:
      - pnpm install
      - pnpm type-check
      - pnpm test
      - test -f .eforge/hook-events.log && grep -q EFORGE_CWD .eforge/hook-events.log
    description: "Add GET /health endpoint to Express API"

  - id: todo-api-auth
    fixture: todo-api
    prd: docs/add-jwt-auth.md
    validate:
      - pnpm install
      - pnpm type-check
      - pnpm test
      - test -f .eforge/hook-events.log && grep -q EFORGE_CWD .eforge/hook-events.log
    description: "Add JWT auth middleware + protected routes"

  - id: workspace-api-collaboration
    fixture: workspace-api
    prd: docs/add-collaboration-platform.md
    validate:
      - pnpm install
      - pnpm type-check
      - pnpm test
      - test -f .eforge/hook-events.log && grep -q EFORGE_CWD .eforge/hook-events.log
    description: "Add auth, permissions, events, audit, and search to workspace API (expedition)"
