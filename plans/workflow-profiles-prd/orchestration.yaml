name: workflow-profiles-prd
description: Config-driven workflow profiles - replace hardcoded
  scope-to-pipeline mapping with declarative profiles that define compile/build
  stages, agent parameters, and review strategy
created: 2026-03-16
compiled: 2026-03-17
mode: expedition
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-config-and-types
    name: Profile config types, parsing, validation, extension resolution, and new
      event types
    depends_on: []
    branch: workflow-profiles-prd/config-and-types
  - id: plan-02-backend-and-prompts
    name: Backend model override support, prompt path resolution for custom prompts,
      and planner prompt update for profile selection
    depends_on:
      - plan-01-config-and-types
    branch: workflow-profiles-prd/backend-and-prompts
  - id: plan-03-engine-pipeline
    name: Refactor compile/build/adopt in eforge.ts to be profile-driven pipeline
      executors with profile selection pre-step
    depends_on:
      - plan-01-config-and-types
      - plan-02-backend-and-prompts
    branch: workflow-profiles-prd/engine-pipeline
  - id: plan-04-cli-and-display
    name: CLI --profiles flag, display rendering for plan:profile events, and CLI
      options wiring
    depends_on:
      - plan-03-engine-pipeline
    branch: workflow-profiles-prd/cli-and-display
  - id: plan-05-monitor-and-downstream
    name: Monitor UI types, event card rendering, mock server updates, eforge plugin
      version bump, and CLAUDE.md updates
    depends_on:
      - plan-01-config-and-types
      - plan-03-engine-pipeline
    branch: workflow-profiles-prd/monitor-and-downstream
