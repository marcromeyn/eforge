name: move-prd-queue-lock-files-to-eforge
description: Relocate PRD queue lock files from docs/prd-queue/ to
  .eforge/queue-locks/ so they are gitignored and do not pollute git status
created: 2026-03-28
compiled: 2026-03-28
mode: lock-file-relocation
base_branch: main
profile:
  extends: errand
  description: Small, self-contained changes. Single file or a few lines. Low
    risk, no architectural impact.
  compile:
    - prd-passthrough
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-relocate-lock-files
    name: Relocate PRD Queue Lock Files to .eforge/queue-locks/
    depends_on: []
    branch: move-prd-queue-lock-files-to-eforge/relocate-lock-files
    build:
      - implement
      - review-cycle
    review:
      strategy: single
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
