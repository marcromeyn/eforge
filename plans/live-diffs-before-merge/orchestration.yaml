name: live-diffs-before-merge
description: Show file diffs in the monitor during active builds using
  branch-based diffing as a fallback when no merge commit exists yet
created: 2026-03-20
compiled: 2026-03-20
mode: errand
base_branch: main
validate:
  - pnpm type-check
  - pnpm build
  - pnpm test
plans:
  - id: plan-01-branch-diff-fallback
    name: Branch-Based Diff Fallback
    depends_on: []
    branch: live-diffs-before-merge/branch-diff-fallback
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
profile:
  extends: errand
  description: Small, self-contained changes. Single file or a few lines. Low
    risk, no architectural impact.
  compile:
    - prd-passthrough
