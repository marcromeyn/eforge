name: fix-diff-viewer-syntax-highlighting
description: Fix Shiki-based diff syntax highlighting in monitor UI by sharing a
  cached highlighter, cleaning git diff output, and improving error visibility
created: 2026-03-23
compiled: 2026-03-23
mode: errand
base_branch: main
validate:
  - pnpm type-check
  - pnpm build
plans:
  - id: plan-01-fix-diff-highlighting
    name: Fix Diff Viewer Syntax Highlighting
    depends_on: []
    branch: fix-diff-viewer-syntax-highlighting/fix-diff-highlighting
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
profile:
  extends: excursion
  description: "Multi-file feature work or refactors. Use when changes touch many
    files but are tightly coupled - e.g., type signature changes that cascade to
    consumers, interface refactors, rename-and-update-all-callers. The key test:
    can every piece pass type-check independently? If not, use excursion."
  compile:
    - planner
    - plan-review-cycle
