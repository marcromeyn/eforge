  can see when formatting is happening, its progress, and its result
created: 2026-03-23
compiled: 2026-03-23
mode: errand
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-enqueue-monitor-visibility
    name: Add Formatter/Enqueue Visibility to Monitor
    depends_on: []
    branch: plan-add-formatter-enqueue-visibility-to-monitor/enqueue-monitor-visibility
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
profile:
  extends: excursion
  description: "Multi-file feature work or refactors. Use when changes touch many
    files but are tightly coupled - e.g., type signature changes that cascade to
    consumers, interface refactors, rename-and-update-all-callers. The key test:
    can every piece pass type-check independently? If not, use excursion."
  compile:
    - planner
    - plan-review-cycle
