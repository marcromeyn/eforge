name: monitor-diff-viewer-heatmap-integration
description: Add diff viewer to monitor heatmap - click files to see
  Shiki-highlighted unified diffs from squash-merge commits
created: 2026-03-20
compiled: 2026-03-20
mode: excursion
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-backend-diff-api
    name: Backend Diff API
    depends_on: []
    branch: monitor-diff-viewer-heatmap-integration/backend-diff-api
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
        - security
      maxRounds: 1
      evaluatorStrictness: standard
  - id: plan-02-ui-diff-viewer
    name: UI Diff Viewer
    depends_on:
      - plan-01-backend-diff-api
    branch: monitor-diff-viewer-heatmap-integration/ui-diff-viewer
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
profile:
  extends: excursion
  description: "Multi-file feature work or refactors. Use when changes touch many
    files but are tightly coupled - e.g., type signature changes that cascade to
    consumers, interface refactors, rename-and-update-all-callers. The key test:
    can every piece pass type-check independently? If not, use excursion."
  compile:
    - planner
    - plan-review-cycle
