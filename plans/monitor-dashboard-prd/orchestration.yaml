name: monitor-dashboard-prd
description: Transform the eforge web monitor into a rich React+shadcn/ui
  dashboard with dependency graph visualization, plan preview, wave-level
  timeline grouping, and file change heatmap
created: 2026-03-14
compiled: 2026-03-14
mode: expedition
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-engine-events
    name: Add build:files_changed event type and builder emission logic
    depends_on: []
    branch: monitor-dashboard-prd/engine-events
  - id: plan-02-react-foundation
    name: Vite+React+shadcn SPA setup, server updates for static assets and new API
      endpoints, feature parity with existing vanilla JS UI
    depends_on: []
    branch: monitor-dashboard-prd/react-foundation
  - id: plan-03-dependency-graph
    name: Interactive ReactFlow DAG visualization with wave swim lanes and status
      coloring
    depends_on:
      - plan-02-react-foundation
    branch: monitor-dashboard-prd/dependency-graph
  - id: plan-04-file-heatmap
    name: File change heatmap showing overlap and merge conflict risk across plans
    depends_on:
      - plan-02-react-foundation
      - plan-01-engine-events
    branch: monitor-dashboard-prd/file-heatmap
  - id: plan-05-plan-preview
    name: Slide-out plan file preview panel with shiki syntax highlighting
    depends_on:
      - plan-02-react-foundation
    branch: monitor-dashboard-prd/plan-preview
  - id: plan-06-wave-timeline
    name: Collapsible wave-level timeline grouping for multi-plan orchestrations
    depends_on:
      - plan-02-react-foundation
    branch: monitor-dashboard-prd/wave-timeline
