name: eval-scenario-expansion
description: Expand eval suite to 9 scenarios across 3 fixtures with assertion
  infrastructure for validating planner decisions
created: 2026-03-20
compiled: 2026-03-20
mode: excursion
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
  - cd eval/fixtures/notes-api && pnpm install && pnpm type-check && pnpm test
plans:
  - id: plan-01-assertion-infrastructure
    name: Assertion Infrastructure
    depends_on: []
    branch: eval-scenario-expansion/assertion-infrastructure
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
  - id: plan-02-notes-api-fixture
    name: Notes API Fixture
    depends_on: []
    branch: eval-scenario-expansion/notes-api-fixture
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
  - id: plan-03-prds-and-scenarios
    name: PRDs and Scenario Config
    depends_on:
      - plan-01-assertion-infrastructure
      - plan-02-notes-api-fixture
    branch: eval-scenario-expansion/prds-and-scenarios
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
        - docs
      maxRounds: 1
      evaluatorStrictness: standard
profile:
  extends: excursion
  description: "Multi-file feature work or refactors. Use when changes touch many
    files but are tightly coupled - e.g., type signature changes that cascade to
    consumers, interface refactors, rename-and-update-all-callers. The key test:
    can every piece pass type-check independently? If not, use excursion."
  compile:
    - planner
    - plan-review-cycle
