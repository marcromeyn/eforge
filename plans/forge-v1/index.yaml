name: forge-v1
description: Extract plan-build-review workflow from schaake-cc-marketplace plugins into standalone CLI on claude-agent-sdk. Library-first architecture with event-driven engine supporting CLI, headless, TUI, and web UI surfaces.
created: 2026-03-12
status: draft
mode: expedition

architecture:
  status: complete
  last_updated: 2026-03-12

modules:
  foundation:
    status: planned
    description: ForgeEvent types, plan parsing, prompt loading, SDK→event mapping
  planner:
    status: planned
    description: Planner agent + planner prompt extraction from excursion-planner
    depends_on: [foundation]
  builder:
    status: planned
    description: Builder agent (multi-turn) + builder/evaluator prompts
    depends_on: [foundation]
  reviewer:
    status: planned
    description: Reviewer agent + reviewer prompt extraction
    depends_on: [foundation]
  orchestration:
    status: planned
    description: Dependency graph, wave execution, worktree lifecycle, state tracking
    depends_on: [foundation]
  config:
    status: planned
    description: forge.yaml loading, Langfuse tracing setup
    depends_on: [foundation]
  forge-core:
    status: planned
    description: ForgeEngine integration (plan/build/review/status methods)
    depends_on: [planner, builder, reviewer, orchestration, config]
  cli:
    status: planned
    description: Commander wiring, display rendering, interactive prompts
    depends_on: [forge-core]
