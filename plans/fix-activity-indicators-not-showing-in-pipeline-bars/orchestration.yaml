name: fix-activity-indicators-not-showing-in-pipeline-bars
description: Make timestamp a required field on the base EforgeEvent type so
  every event is self-timestamped, fixing the activity overlay in pipeline bars
created: 2026-03-25
compiled: 2026-03-25
mode: errand
base_branch: main
validate:
  - pnpm type-check
  - pnpm build
  - pnpm test
plans:
  - id: plan-01-add-timestamp-to-all-events
    name: Add Required Timestamp to All EforgeEvents
    depends_on: []
    branch: fix-activity-indicators-not-showing-in-pipeline-bars/add-timestamp-to-all-events
    build:
      - implement
      - review-cycle
    review:
      strategy: single
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
profile:
  extends: excursion
  description: "Multi-file feature work or refactors. Use when changes touch many
    files but are tightly coupled - e.g., type signature changes that cascade to
    consumers, interface refactors, rename-and-update-all-callers. The key test:
    can every piece pass type-check independently? If not, use excursion."
  compile:
    - planner
    - plan-review-cycle
