name: plan-move-timeline-to-pinned-bottom-console-panel
description: Pin Timeline to a dedicated always-visible bottom console panel
  using react-resizable-panels, removing it from the tab group
created: 2026-03-23
compiled: 2026-03-23
mode: errand
base_branch: main
validate:
  - cd src/monitor/ui && pnpm type-check
  - cd src/monitor/ui && pnpm build
plans:
  - id: plan-01-console-panel
    name: Move Timeline to Pinned Bottom Console Panel
    depends_on: []
    branch: plan-move-timeline-to-pinned-bottom-console-panel/console-panel
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
profile:
  extends: excursion
  description: "Multi-file feature work or refactors. Use when changes touch many
    files but are tightly coupled - e.g., type signature changes that cascade to
    consumers, interface refactors, rename-and-update-all-callers. The key test:
    can every piece pass type-check independently? If not, use excursion."
  compile:
    - planner
    - plan-review-cycle
