build:
  postMergeCommands:
    - pnpm install
    - pnpm type-check
    - pnpm test
    - pnpm build

profiles:
  docs:
    extends: errand
    description: >-
      Documentation-only changes. Plans and implements but skips code review
      since review categories (bugs, security, types, etc.) don't apply to prose.
    build:
      - implement
