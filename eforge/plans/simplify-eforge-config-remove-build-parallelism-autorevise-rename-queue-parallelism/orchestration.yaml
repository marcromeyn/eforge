name: simplify-eforge-config-remove-build-parallelism-autorevise-rename-queue-parallelism
description: Remove build.parallelism, autoRevise, prdQueue.parallelism config
  fields; add top-level maxConcurrentBuilds with default 2
created: 2026-04-01
compiled: 2026-04-01
mode: config-refactor
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-config-and-consumers
    name: Remove config fields, add maxConcurrentBuilds, update all consumers and
      tests
    depends_on: []
    branch: simplify-eforge-config-remove-build-parallelism-autorevise-rename-queue-parallelism/config-and-consumers
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
  - id: plan-02-docs-plugin-projectconfig
    name: Update docs, plugin skill, project config, and bump plugin version
    depends_on:
      - plan-01-config-and-consumers
    branch: simplify-eforge-config-remove-build-parallelism-autorevise-rename-queue-parallelism/docs-plugin-projectconfig
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - docs
      maxRounds: 1
      evaluatorStrictness: lenient
profile:
  extends: excursion
  description: Multi-file feature work or refactors. Use when the full scope can
    be planned in a single planner session - all plans enumerated, all file
    changes listed, and cross-plan dependencies resolved. Covers tightly coupled
    changes (type cascades, interface refactors, rename-and-update-all-callers)
    and any work where one planning pass is sufficient.
  compile:
    - planner
    - plan-review-cycle
