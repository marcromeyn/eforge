name: fix-dependency-graph-indentation-and-prd-plan-swimlane-alignment
description: Fix PRD/Plan swimlane horizontal alignment and add dependency-depth
  indentation with step connectors to the graph tab
created: 2026-04-01
compiled: 2026-04-01
mode: errand
base_branch: main
validate:
  - pnpm type-check
  - pnpm build
plans:
  - id: plan-01-fix-pipeline-and-graph-visuals
    name: Fix pipeline swimlane alignment and graph indentation
    depends_on: []
    branch: fix-dependency-graph-indentation-and-prd-plan-swimlane-alignment/fix-pipeline-and-graph-visuals
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
  defaultBuild:
    - implement
    - review-cycle
  defaultReview:
    strategy: single
    perspectives:
      - correctness
    maxRounds: 1
    evaluatorStrictness: lenient
  rationale: This is a well-scoped UI bug fix touching 3 files across two related
    visual issues (swimlane alignment and graph indentation). The PRD provides
    exact line numbers and concrete code changes, making it straightforward but
    multi-file - fitting excursion scope. Standard planner is used since there
    are two distinct fixes that benefit from plan decomposition (alignment fix
    vs graph indentation/edge fix). A single review round with lenient
    strictness suffices because these are purely cosmetic/visual changes with no
    data, security, or API risk. Only a correctness perspective is needed to
    verify the props are passed correctly and the depth calculation handles edge
    cases like diamond dependencies. No doc-update or test stages are warranted
    since there are no API changes and no testing requirements mentioned.
