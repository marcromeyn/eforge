name: document-pi-package-as-architecture-consumer
description: Document the Pi package as a first-class architecture consumer in
  docs/architecture.md
created: 2026-04-03
compiled: 2026-04-03
mode: errand
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-add-pi-package-consumer
    name: Add Pi Package as Architecture Consumer
    depends_on: []
    branch: document-pi-package-as-architecture-consumer/add-pi-package-consumer
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - docs
      maxRounds: 1
      evaluatorStrictness: lenient
pipeline:
  scope: errand
  compile:
    - prd-passthrough
  defaultBuild:
    - implement
  defaultReview:
    strategy: single
    perspectives:
      - correctness
    maxRounds: 1
    evaluatorStrictness: lenient
  rationale: This is a documentation-only change to a single file
    (docs/architecture.md) with three well-defined edits spelled out in the PRD.
    prd-passthrough is sufficient since the PRD already serves as a complete
    implementation plan. No review-cycle or doc-update stages are needed - the
    task itself is a doc update, and the edits are straightforward enough that a
    single lenient review round catches any formatting issues without
    over-investing.
