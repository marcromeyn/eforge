name: filter-eforge-mcp-servers-and-pi-extensions-from-build-agents
description: Filter eforge MCP servers and Pi extensions from build agents to
  prevent orphaned daemon spawns and recursive build loops
created: 2026-04-03
compiled: 2026-04-03
mode: errand
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-filter-eforge-tools
    name: Filter eforge MCP servers and Pi extensions from build agents
    depends_on: []
    branch: filter-eforge-mcp-servers-and-pi-extensions-from-build-agents/filter-eforge-tools
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - prd-passthrough
  defaultBuild:
    - implement
    - review-cycle
    - test-cycle
  defaultReview:
    strategy: single
    perspectives:
      - correctness
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: This is a well-scoped safety fix touching 3 files with precise
    instructions. Using prd-passthrough since the PRD already contains exact
    code patterns and file locations - no LLM planning decomposition needed. The
    build includes implement, review-cycle (to verify the filters are correctly
    placed and match existing patterns), and test-cycle (PRD explicitly requires
    new tests and passing existing tests). Single correctness perspective is
    sufficient since the changes are small but safety-critical - we want to
    ensure exact match semantics and explicit-path bypass behavior are correct.
