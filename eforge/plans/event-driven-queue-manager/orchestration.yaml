name: event-driven-queue-manager
description: Replace poll-sleep queue watcher with fs.watch-based event-driven
  queue manager for immediate PRD discovery and slot filling
created: 2026-04-01
compiled: 2026-03-31
mode: event-driven-refactor
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-event-types-and-discovery
    name: Event Types and Mid-Cycle Discovery
    depends_on: []
    branch: event-driven-queue-manager/event-types-and-discovery
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
  - id: plan-02-fs-watch-and-daemon
    name: fs.watch Watcher and Daemon Integration
    depends_on:
      - plan-01-event-types-and-discovery
    branch: event-driven-queue-manager/fs-watch-and-daemon
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
profile:
  extends: excursion
  description: Multi-file feature work or refactors. Use when the full scope can
    be planned in a single planner session - all plans enumerated, all file
    changes listed, and cross-plan dependencies resolved. Covers tightly coupled
    changes (type cascades, interface refactors, rename-and-update-all-callers)
    and any work where one planning pass is sufficient.
  compile:
    - planner
    - plan-review-cycle
