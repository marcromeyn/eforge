name: fix-gap-close-plan-preview-shows-empty-panel
description: Emit gap_close:plan_ready event and wire it through server API and
  client UI so the plan preview panel displays the gap-close plan instead of
  showing empty
created: 2026-04-04
compiled: 2026-04-04
mode: excursion
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-gap-close-plan-event
    name: Emit and consume gap_close:plan_ready event
    depends_on: []
    branch: fix-gap-close-plan-preview-shows-empty-panel/gap-close-plan-event
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: errand
  compile:
    - prd-passthrough
  defaultBuild:
    - implement
  defaultReview:
    strategy: auto
    perspectives:
      - correctness
    maxRounds: 1
    autoAcceptBelow: suggestion
    evaluatorStrictness: lenient
  rationale: This is a well-defined bug fix with exact code snippets provided for
    5 files. All changes are small, mechanical additions - a new event type, a
    yield statement, and wiring that event into existing server/client rendering
    paths. No complex logic, no API design decisions, no architectural concerns.
    prd-passthrough is ideal since the PRD itself is the implementation plan. A
    single light review round for correctness is sufficient to catch any typos
    or missed wiring.
