name: fix-commit-not-found-in-monitor-changes-tab
description: Fix "Commit not found" in monitor Changes tab for in-progress
  builds by falling back to the feature branch when neither a commit SHA nor the
  plan branch is available
created: 2026-03-30
compiled: 2026-03-30
mode: errand
base_branch: main
validate:
  - pnpm type-check
  - pnpm build
  - pnpm test
plans:
  - id: plan-01-feature-branch-fallback
    name: Feature Branch Fallback for Monitor Diffs
    depends_on: []
    branch: fix-commit-not-found-in-monitor-changes-tab/feature-branch-fallback
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
profile:
  extends: errand
  description: Small, self-contained changes. Single file or a few lines. Low
    risk, no architectural impact.
  compile:
    - prd-passthrough
