name: smart-prd-gap-closer-assess-plan-build
description: Replace the simple one-shot gap closer with a multi-stage pipeline
  that assesses completion, gates on viability, and executes gap fixes through
  the existing build infrastructure
created: 2026-04-01
compiled: 2026-04-01
mode: excursion
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-enhanced-validation
    name: Enhanced PRD Validation Output and Viability Gate
    depends_on: []
    branch: smart-prd-gap-closer-assess-plan-build/enhanced-validation
    build:
      - - implement
        - doc-update
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
  - id: plan-02-plan-based-gap-closer
    name: Plan-Based Gap Closer Execution
    depends_on:
      - plan-01-enhanced-validation
    branch: smart-prd-gap-closer-assess-plan-build/plan-based-gap-closer
    build:
      - - implement
        - doc-update
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 2
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - review-cycle
  defaultReview:
    strategy: auto
    perspectives:
      - correctness
      - maintainability
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This is excursion-scope work - it touches 6+ files across multiple
    subsystems (validator, orchestrator phases, prompts, events, monitor UI,
    CLI) but they are tightly coupled around a single feature flow rather than
    independent modules needing architecture coordination. Plan-review-cycle is
    included because the work spans engine internals, UI components, and agent
    prompts - plan quality matters to avoid rework across these layers.
    Review-cycle with correctness and maintainability perspectives covers the
    main risks: correctly wiring gap-close through existing build stages and
    keeping the orchestrator code maintainable. Standard strictness and 2 rounds
    are appropriate for internal feature work with no security or data integrity
    concerns. No test-write stage since the PRD requires existing tests to pass
    but doesn't call for new test generation. doc-update is included since
    the plans modify CLI display, monitor UI, and event types."
