name: add-pi-mono-backend-for-eforge
description: Add PiBackend as a second AgentBackend implementation, giving
  eforge users provider flexibility via pi-coding-agent with OpenRouter and 20+
  other LLM providers
created: 2026-03-29
compiled: 2026-03-29
mode: new-backend-integration
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-config-and-deps
    name: Config Schema and Dependencies
    depends_on: []
    branch: add-pi-mono-backend-for-eforge/config-and-deps
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
        - api
      maxRounds: 2
      evaluatorStrictness: strict
  - id: plan-02-pi-backend
    name: PiBackend Implementation
    depends_on:
      - plan-01-config-and-deps
    branch: add-pi-mono-backend-for-eforge/pi-backend
    build:
      - - implement
        - doc-update
      - review-cycle
    review:
      strategy: parallel
      perspectives:
        - code
        - api
      maxRounds: 2
      evaluatorStrictness: strict
  - id: plan-03-engine-wiring-and-tests
    name: Engine Wiring and Tests
    depends_on:
      - plan-02-pi-backend
    branch: add-pi-mono-backend-for-eforge/engine-wiring-and-tests
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
profile:
  extends: excursion
  description: Multi-file feature work or refactors. Use when the full scope can
    be planned in a single planner session - all plans enumerated, all file
    changes listed, and cross-plan dependencies resolved. Covers tightly coupled
    changes (type cascades, interface refactors, rename-and-update-all-callers)
    and any work where one planning pass is sufficient.
  compile:
    - planner
    - plan-review-cycle
