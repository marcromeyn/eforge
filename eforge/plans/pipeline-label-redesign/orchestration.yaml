name: pipeline-label-redesign
description: Consolidate artifact pills into pipeline left column, move compile
  stage overview into Compile row, and remove ArtifactsStrip
created: 2026-04-01
compiled: 2026-04-01
mode: ui-refactor
base_branch: main
validate:
  - pnpm type-check
  - pnpm build
plans:
  - id: plan-01-pipeline-label-redesign
    name: Pipeline Label Redesign
    depends_on: []
    branch: pipeline-label-redesign/label-redesign
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
profile:
  extends: excursion
  description: Multi-file feature work or refactors. Use when the full scope can
    be planned in a single planner session - all plans enumerated, all file
    changes listed, and cross-plan dependencies resolved. Covers tightly coupled
    changes (type cascades, interface refactors, rename-and-update-all-callers)
    and any work where one planning pass is sufficient.
  compile:
    - planner
    - plan-review-cycle
