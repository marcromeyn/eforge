name: fix-merge-commit-message-scope-and-cleanup-commit-location
description: Fix merge commit message scope to use set-level name and move
  cleanup commit onto feature branch before the --no-ff merge
created: 2026-03-31
compiled: 2026-03-31
mode: git-workflow-fix
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-fix-merge-and-cleanup
    name: Fix merge commit scope and move cleanup to feature branch
    depends_on: []
    branch: fix-merge-commit-message-scope-and-cleanup-commit-location/fix-merge-and-cleanup
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
profile:
  extends: excursion
  description: Multi-file feature work or refactors. Use when the full scope can
    be planned in a single planner session - all plans enumerated, all file
    changes listed, and cross-plan dependencies resolved. Covers tightly coupled
    changes (type cascades, interface refactors, rename-and-update-all-callers)
    and any work where one planning pass is sufficient.
  compile:
    - planner
    - plan-review-cycle
