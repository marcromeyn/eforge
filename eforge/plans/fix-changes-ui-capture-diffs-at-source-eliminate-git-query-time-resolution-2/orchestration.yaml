name: fix-changes-ui-capture-diffs-at-source-eliminate-git-query-time-resolution-2
description: Replace fragile git-query-time diff resolution with
  capture-at-source pattern - diffs stored in SQLite, served via DB query
created: 2026-03-31
compiled: 2026-03-31
mode: capture-at-source-refactor
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-engine-diff-capture
    name: Engine Diff Capture and Config
    depends_on: []
    branch: fix-changes-ui-capture-diffs-at-source-eliminate-git-query-time-resolution-2/engine-diff-capture
    build:
      - - implement
        - doc-update
      - review-cycle
      - test-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
  - id: plan-02-monitor-diff-storage
    name: Monitor Diff Storage and Simplified Endpoint
    depends_on:
      - plan-01-engine-diff-capture
    branch: fix-changes-ui-capture-diffs-at-source-eliminate-git-query-time-resolution-2/monitor-diff-storage
    build:
      - implement
      - review-cycle
      - test-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
profile:
  extends: excursion
  description: Multi-file feature work or refactors. Use when the full scope can
    be planned in a single planner session - all plans enumerated, all file
    changes listed, and cross-plan dependencies resolved. Covers tightly coupled
    changes (type cascades, interface refactors, rename-and-update-all-callers)
    and any work where one planning pass is sufficient.
  compile:
    - planner
    - plan-review-cycle
