name: fix-prd-files-not-removed-after-build
description: Remove mutable status field from PRD frontmatter, use
  file-location-based state model so feature branches merge cleanly after build
created: 2026-03-31
compiled: 2026-03-31
mode: type-removal-refactor
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-remove-status-field
    name: Remove PRD status field and add file-location state helpers
    depends_on: []
    branch: fix-prd-files-not-removed-after-build/remove-status-field
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
profile:
  extends: excursion
  description: Multi-file feature work or refactors. Use when the full scope can
    be planned in a single planner session - all plans enumerated, all file
    changes listed, and cross-plan dependencies resolved. Covers tightly coupled
    changes (type cascades, interface refactors, rename-and-update-all-callers)
    and any work where one planning pass is sufficient.
  compile:
    - planner
    - plan-review-cycle
