name: backend-aware-model-references-for-eforge-config-yaml
description: Redesign eforge model configuration so model references are
  backend-aware objects instead of plain strings
created: 2026-04-03
compiled: 2026-04-03
mode: excursion
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-engine-model-ref
    name: Engine ModelRef Types, Schema, and Backend Changes
    depends_on: []
    branch: backend-aware-model-references-for-eforge-config-yaml/engine-model-ref
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 2
      evaluatorStrictness: standard
  - id: plan-02-docs-and-guidance
    name: Documentation and Integration Package Updates
    depends_on:
      - plan-01-engine-model-ref
    branch: backend-aware-model-references-for-eforge-config-yaml/docs-and-guidance
    build:
      - implement
      - review-cycle
    review:
      strategy: single
      perspectives:
        - docs
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - - review-cycle
      - doc-update
      - test-write
  defaultReview:
    strategy: auto
    perspectives:
      - correctness
      - maintainability
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: This is a cross-cutting refactor that touches config schemas, type
    definitions, two backend implementations, engine wiring, tests, docs, and
    two consumer integration packages. It's clearly excursion scope -
    significant multi-file work but not 4+ independent subsystems requiring
    expedition-level module planning. Plan-review-cycle is included because the
    PRD has detailed backend-conditional validation rules and a specific
    execution order that a planner could get wrong. Review-cycle runs in
    parallel with doc-update (PRD explicitly requires README, docs/config.md,
    plugin, and pi-package updates) and test-write (PRD details extensive new
    test cases for schema validation, resolution logic, and Pi registry lookup).
    Two review rounds with correctness and maintainability perspectives catch
    type ripple issues and ensure the Zod superRefine approach is clean.
    Standard strictness is appropriate - this is a structural refactor with no
    security or data integrity risk.
